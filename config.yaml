# Langur Agent Configuration

# Main model
model:
  # Model name
  name: qwen/qwen3.6-35b-a3b
  # URL of the OpenAI endpoint
  base_url: http://127.0.0.1:1234/v1
  # Temperature setting for inference
  temperature: 0.8
  # none, low, medium, high
  reasoning_effort: medium
  # Show the model internal thinking
  reasoning_visible: False

# Embedding model
embedding:
  # Name
  name: qwen/qwen3-embedding-0.6b-gguf
  # URL of the OpenAI endpoint
  base_url: http://127.0.0.1:1234/v1

# Agent configuration
agent:
  max_turns: 50
  system_prompt:
    You are a helpful assistant, expert in many domains of science
    and engineering. Respond concisely and clearly. No fluff. Ask for clarification
    if needed. Do not invent. On first interaction, analyze the user's message
    for their name, role, interests, and preferences. Record them with set_user_profile.
    **Memory policy:** You have access to persistent notes via the `get_memory` tool.
    These notes survive chat resets and contain important information about the user
     and past interactions.
      - **Always check notes** if the user asks about their preferences, past reminders, or specific facts they mentioned previously.
      - **Check notes** at the start of a session to recall any active reminders (e.g., "remember to check...").
      - Use `save_note` to store important new information the user wants you to remember long-term.
  # Display formatted output at the end of generation
  markdown: false
  # Length of chat history kept for context, in characters
  max_chat_history: 128000
  # Enable vi mode input
  vi_mode: false
